# Build the handheld cart player as fully-static musl binaries for
# aarch64/armv7 devices (PowKiddy RGB10S, Anbernic RG351/353, ...) on
# every push to main, smoke-test the same code on the host, and upload
# a ready-to-copy ports bundle as an artifact.

name: build handheld player

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  handheld:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl,armv7-unknown-linux-musleabihf,wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Host smoke test
        run: |
          cargo test -p rico8-player
          cargo build --release -p rico8-player
          cargo build --release -p rico8-console --no-default-features
          ./target/release/rico8 export examples/platformer /tmp/platformer.png
          ./target/release/rico8-player --smoke 60 /tmp/platformer.png

      - name: Cross-build the static musl ports bundle
        run: ./.github/build-handheld.sh dist/handheld

      - name: Add the example carts to the bundle
        run: |
          for manifest in examples/*/Cargo.toml; do
            ex=$(basename "$(dirname "$manifest")")
            ./target/release/rico8 export "examples/$ex" "dist/handheld/rico8/carts/$ex.png"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: rico8-handheld
          path: dist/handheld
