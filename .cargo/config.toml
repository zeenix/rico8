# `cargo console` boots RICO-8.
[alias]
console = "run --release -p rico8-console"

# Handheld player builds as fully-static musl binaries (see docs/HANDHELD.md). rust-lld +
# self-contained linking needs no cross-gcc, no zig, no Docker.
[target.aarch64-unknown-linux-musl]
linker = "rust-lld"
rustflags = ["-C", "link-self-contained=yes", "-C", "strip=symbols"]

[target.armv7-unknown-linux-musleabihf]
linker = "rust-lld"
rustflags = ["-C", "link-self-contained=yes", "-C", "strip=symbols"]
